<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Capital Allocator Pro</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen font-sans antialiased">
    <!-- Navbar -->
    <nav class="border-b border-slate-800 bg-slate-900/50 backdrop-blur sticky top-0 z-50 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <span class="text-xl font-bold bg-gradient-to-r from-emerald-400 to-teal-400 bg-clip-text text-transparent">⚡ Smart Capital Allocator</span>
            <span class="text-xs font-semibold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2.5 py-1 rounded-full">v1.0 Live</span>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- Input Form Card -->
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-2xl mb-8 max-w-2xl mx-auto">
            <label class="block text-sm font-medium mb-3 text-slate-400">Enter Your Investment Budget (₹)</label>
            <div class="flex flex-col sm:flex-row gap-3">
                <input id="capitalInput" type="number" value="5000" class="flex-1 bg-slate-800 p-3 rounded-xl text-xl font-semibold text-white border border-slate-700 focus:outline-none focus:border-emerald-500 transition-colors">
                <button onclick="fetchAllocation()" class="bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-slate-950 font-bold px-8 py-3 rounded-xl text-lg transition duration-200 shadow-lg shadow-emerald-500/10">Analyze Capital</button>
            </div>
        </div>

        <!-- Strategy Summary Badge -->
        <div class="text-center mb-8">
            <span id="strategyBadge" class="inline-block bg-amber-500/10 text-amber-400 border border-amber-500/20 px-4 py-2 rounded-xl text-sm font-bold tracking-wide uppercase">Initializing Data Engine...</span>
        </div>

        <!-- Loading Overlay -->
        <div id="loadingIndicator" class="hidden text-center py-12">
            <div class="animate-spin inline-block w-8 h-8 border-[3px] border-current border-t-transparent text-emerald-500 rounded-full" role="status"></div>
            <p class="text-slate-400 mt-2 text-sm">Querying real-time market sheets...</p>
        </div>

        <!-- Data Grid Display Columns -->
        <div id="dashboardGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- STOCKS -->
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-xl">
                <div class="flex justify-between items-center mb-4 border-b border-slate-800 pb-3">
                    <h3 class="text-lg font-bold text-emerald-400 flex items-center gap-2">🟢 Stocks</h3>
                    <span id="stockCount" class="text-xs bg-slate-800 text-slate-400 px-2 py-0.5 rounded-md font-mono">0</span>
                </div>
                <div id="stockList" class="space-y-3"></div>
            </div>

            <!-- ETFS -->
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-xl">
                <div class="flex justify-between items-center mb-4 border-b border-slate-800 pb-3">
                    <h3 class="text-lg font-bold text-sky-400 flex items-center gap-2">🔵 ETFs</h3>
                    <span id="etfCount" class="text-xs bg-slate-800 text-slate-400 px-2 py-0.5 rounded-md font-mono">0</span>
                </div>
                <div id="etfList" class="space-y-3"></div>
            </div>

            <!-- MUTUAL FUNDS -->
            <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-xl">
                <div class="flex justify-between items-center mb-4 border-b border-slate-800 pb-3">
                    <h3 class="text-lg font-bold text-purple-400 flex items-center gap-2">🟣 Mutual Funds</h3>
                    <span id="mfCount" class="text-xs bg-slate-800 text-slate-400 px-2 py-0.5 rounded-md font-mono">0</span>
                </div>
                <div id="mfList" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        async function fetchAllocation() {
            const val = document.getElementById('capitalInput').value;
            const loading = document.getElementById('loadingIndicator');
            const grid = document.getElementById('dashboardGrid');
            
            loading.classList.remove('hidden');
            grid.classList.add('opacity-40');

            try {
                // 🚀 Automatically calls your live Render server root path
                const response = await fetch(`https://onrender.com{val}`);
                const data = await response.json();
                
                document.getElementById('strategyBadge').innerText = `📊 PLAN: ${data.strategy}`;
                
                const sList = document.getElementById('stockList');
                const eList = document.getElementById('etfList');
                const mList = document.getElementById('mfList');
                
                sList.innerHTML = ''; eList.innerHTML = ''; mList.innerHTML = '';
                let sCount = 0, eCount = 0, mCount = 0;

                data.recommendations.forEach(item => {
                    const card = `
                        <div class="bg-slate-800/60 p-4 rounded-xl border border-slate-700/50 hover:border-slate-600 transition-all duration-200">
                            <p class="font-semibold text-white text-base">${item.name}</p>
                            <div class="flex justify-between items-center mt-3">
                                <span class="text-xs font-bold bg-slate-900 px-2.5 py-1 rounded-md text-emerald-400 border border-slate-700">${item.action}</span>
                                <span class="text-sm font-bold text-slate-300 font-mono">₹${item.cost}</span>
                            </div>
                        </div>`;
                    
                    if(item.type === 'Stock') { sList.innerHTML += card; sCount++; }
                    if(item.type === 'ETF') { eList.innerHTML += card; eCount++; }
                    if(item.type === 'Mutual Fund') { mList.innerHTML += card; mCount++; }
                });

                document.getElementById('stockCount').innerText = sCount;
                document.getElementById('etfCount').innerText = eCount;
                document.getElementById('mfCount').innerText = mCount;

            } catch (err) {
                document.getElementById('strategyBadge').innerText = "⚠️ Network Error: Unable to contact Cloud API Engine";
                console.error(err);
            } finally {
                loading.classList.add('hidden');
                grid.classList.remove('opacity-40');
            }
        }
        window.onload = fetchAllocation;
    </script>
</body>
</html>
