<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Capital Allocator Pro</title>
    <!-- Premium UI Framework Load -->
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body class="bg-gray-950 text-white min-h-screen font-sans antialiased">
    
    <!-- Top Navigation Header Bar -->
    <nav class="border-b border-gray-800 bg-gray-900 bg-opacity-80 backdrop-filter backdrop-blur sticky top-0 z-50 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <span class="text-xl font-bold bg-gradient-to-r from-green-400 to-teal-400 bg-clip-text text-transparent">⚡ Smart Capital Allocator</span>
            <span class="text-xs font-semibold bg-green-500 bg-opacity-10 text-green-400 border border-green-500 border-opacity-20 px-2.5 py-1 rounded-full">v1.0 Production Live</span>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 py-8">
        
        <!-- Input Form Control Panel Card -->
        <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl shadow-2xl mb-8 max-w-2xl mx-auto">
            <label class="block text-sm font-medium mb-3 text-gray-400">Enter Your Total Investment Budget (₹)</label>
            <div class="flex flex-col sm:flex-row gap-3">
                <input id="capitalInput" type="number" value="5000" class="flex-1 bg-gray-800 p-3 rounded-xl text-xl font-semibold text-white border border-gray-700 focus:outline-none focus:border-green-500 transition-colors">
                <button onclick="fetchAllocation()" class="bg-gradient-to-r from-green-500 to-teal-500 hover:from-green-600 hover:to-teal-600 text-gray-950 font-bold px-8 py-3 rounded-xl text-lg transition duration-200 shadow-lg">Analyze Capital</button>
            </div>
        </div>

        <!-- Dynamic Strategic Metric Allocation Badge -->
        <div class="text-center mb-8">
            <span id="strategyBadge" class="inline-block bg-yellow-500 bg-opacity-10 text-yellow-400 border border-yellow-500 border-opacity-20 px-4 py-2 rounded-xl text-sm font-bold tracking-wide uppercase">Awaiting Investment Target...</span>
        </div>

        <!-- Visual Core Async Loading Overlay Spinner -->
        <div id="loadingIndicator" class="hidden text-center py-8">
            <div class="animate-spin inline-block w-8 h-8 border-4 border-green-500 border-t-transparent rounded-full mb-2"></div>
            <p class="text-gray-400 text-sm">Querying active cloud API engines...</p>
        </div>

        <!-- Structural Data Presentation Display Grid -->
        <div id="dashboardGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- STOCKS CARD ELEMENT -->
            <div class="bg-gray-900 p-5 rounded-2xl border border-gray-800 shadow-xl">
                <div class="flex justify-between items-center mb-4 border-b border-gray-800 pb-3">
                    <h3 class="text-lg font-bold text-green-400 flex items-center gap-2">🟢 Stocks</h3>
                    <span id="stockCount" class="text-xs bg-gray-800 text-gray-400 px-2 py-0.5 rounded font-mono font-bold">0</span>
                </div>
                <div id="stockList" class="space-y-3"></div>
            </div>

            <!-- ETFS CARD ELEMENT -->
            <div class="bg-gray-900 p-5 rounded-2xl border border-gray-800 shadow-xl">
                <div class="flex justify-between items-center mb-4 border-b border-gray-800 pb-3">
                    <h3 class="text-lg font-bold text-blue-400 flex items-center gap-2">🔵 ETFs</h3>
                    <span id="etfCount" class="text-xs bg-gray-800 text-gray-400 px-2 py-0.5 rounded font-mono font-bold">0</span>
                </div>
                <div id="etfList" class="space-y-3"></div>
            </div>

            <!-- MUTUAL FUNDS CARD ELEMENT -->
            <div class="bg-gray-900 p-5 rounded-2xl border border-gray-800 shadow-xl">
                <div class="flex justify-between items-center mb-4 border-b border-gray-800 pb-3">
                    <h3 class="text-lg font-bold text-purple-400 flex items-center gap-2">🟣 Mutual Funds</h3>
                    <span id="mfCount" class="text-xs bg-gray-800 text-gray-400 px-2 py-0.5 rounded font-mono font-bold">0</span>
                </div>
                <div id="mfList" class="space-y-3"></div>
            </div>
            
        </div>
    </div>

    <script>
        async function fetchAllocation() {
            const val = document.getElementById('capitalInput').value;
            const loading = document.getElementById('loadingIndicator');
            const grid = document.getElementById('dashboardGrid');
            
            loading.classList.remove('hidden');
            grid.classList.add('opacity-30');

            try {
                // 📡 Connected directly to your live, active production Render backend stream container
                const response = await fetch(`https://onrender.com{val}`);
                const data = await response.json();
                
                document.getElementById('strategyBadge').innerText = `📊 Plan Tier: ${data.strategy}`;
                
                const sList = document.getElementById('stockList');
                const eList = document.getElementById('etfList');
                const mList = document.getElementById('mfList');
                
                sList.innerHTML = ''; eList.innerHTML = ''; mList.innerHTML = '';
                let sCount = 0, eCount = 0, mCount = 0;

                data.recommendations.forEach(item => {
                    const card = `
                        <div class="bg-gray-800 bg-opacity-60 p-4 rounded-xl border border-gray-700 hover:border-gray-600 transition-all duration-200 shadow-md">
                            <p class="font-bold text-white text-base tracking-wide">${item.name}</p>
                            <div class="flex justify-between items-center mt-3">
                                <span class="text-xs font-bold bg-gray-950 px-2.5 py-1 rounded border border-gray-700 text-green-400">${item.action}</span>
                                <span class="text-sm font-bold text-gray-200 font-mono">₹${item.cost}</span>
                            </div>
                        </div>`;
                    
                    if(item.type === 'Stock') { sList.innerHTML += card; sCount++; }
                    if(item.type === 'ETF') { eList.innerHTML += card; eCount++; }
                    if(item.type === 'Mutual Fund') { mList.innerHTML += card; mCount++; }
                });

                document.getElementById('stockCount').innerText = sCount;
                document.getElementById('etfCount').innerText = eCount;
                document.getElementById('mfCount').innerText = mCount;

            } catch (err) {
                document.getElementById('strategyBadge').innerText = "⚠️ Server waking up. Please wait 10 seconds and re-click Analyze Capital.";
                console.error(err);
            } finally {
                loading.classList.add('hidden');
                grid.classList.remove('opacity-30');
            }
        }
        // Fire initial calculation layout parsing on structural initialization
        window.onload = fetchAllocation;
    </script>
</body>
</html>
